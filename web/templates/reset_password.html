{% extends "base.html" %}
{% block title %}Reset Password — MeridianConnect{% endblock %}
{% block content %}
<div class="card form-narrow">
  <div class="card-header">
    <h1>Reset Password</h1>
  </div>
  {% if invalid %}
    <div class="alert error">This link is invalid or has expired.</div>
  {% else %}
    <p class="page-lead">Resetting password for <strong>{{ user['email'] }}</strong></p>
    <form method="POST">
      <label>New Password</label>
      <input type="password" name="password" required>
      <button class="btn" type="submit" style="width:100%;">Reset Password</button>
    </form>
  {% endif %}
</div>
{% endblock %}
