services:
  web:
    build: ./web
    container_name: meridian_web
    expose:
      - "5000"
    networks:
      - meridiannet
    restart: unless-stopped

  api:
    build: ./api
    container_name: meridian_api
    expose:
      - "5001"
    networks:
      - meridiannet
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: meridian_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - meridiannet
    restart: unless-stopped

networks:
  meridiannet:
    driver: bridge
